name: Build & Release Our Heart

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

# Minimal token permissions for security
permissions:
  contents: read

jobs:
  analyze-and-test:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🎨 Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: 🔬 Analyze code
        run: flutter analyze --fatal-infos

      - name: 🧪 Run tests
        run: flutter test --coverage

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: 📱 Build Android (Release)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: success()
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔐 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 🔑 Create key.properties
        run: |
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      - name: 🏗️ Build APK (Release)
        run: |
          flutter build apk --release --split-per-abi
          flutter build apk --release

      - name: 📦 Build App Bundle (Release)
        run: |
          flutter build appbundle --release

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifacts
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: 📤 Upload App Bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appbundle-artifact
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⬇️ Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: apk-artifacts
          path: artifacts/apks/

      - name: ⬇️ Download App Bundle
        uses: actions/download-artifact@v4
        with:
          name: appbundle-artifact
          path: artifacts/bundle/

      - name: 📝 Generate Release Notes
        run: |
          echo "## 📱 Our Heart ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Assets" >> release_notes.md
          echo "- **[📱 Universal APK](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release.apk)** - Works on all Android devices" >> release_notes.md
          echo "- **[📱 ARM64-v8a APK](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-arm64-v8a-release.apk)** - Optimized for modern 64-bit devices" >> release_notes.md
          echo "- **[📱 ARMEABI-v7a APK](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-armeabi-v7a-release.apk)** - For older 32-bit devices" >> release_notes.md
          echo "- **[📦 App Bundle (AAB)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release.aab)** - For Google Play Store submission" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 💡 Features" >> release_notes.md
          echo "- 💖 Heart filling animation tracks your relationship journey" >> release_notes.md
          echo "- 📸 Shared gallery with photo albums and thumbnails" >> release_notes.md
          echo "- ✍️ Love letters with word/character count" >> release_notes.md
          echo "- 🎬 Lyric video creator with 14 animation styles" >> release_notes.md
          echo "- 🔐 PIN authentication with SHA-256 hashing" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🔧 Installation" >> release_notes.md
          echo "1. Download the APK file appropriate for your device architecture" >> release_notes.md
          echo "2. Open the APK file on your Android device" >> release_notes.md
          echo "3. Allow installation from unknown sources if prompted" >> release_notes.md
          echo "4. Open the app and set up your PIN" >> release_notes.md

      - name: ✨ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          tag_name: ${{ github.ref_name }}
          name: "Our Heart v${{ github.ref_name }}"
          files: |
            artifacts/apks/*.apk
            artifacts/bundle/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}